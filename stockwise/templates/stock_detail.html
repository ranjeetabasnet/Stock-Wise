{% extends 'base.html' %}
{% block content %}
<div class="card">
    <h1>{{ ticker|upper }}</h1>
    <div class="stock-meta">
        <div id="price-summary"><span class="spinner"></span><span class="loading">Loading...</span></div>
        <div id="stock-stats" class="stock-stats" style="margin-top:0.75rem; color:#334155;"></div>
    </div>
    <div id="stats-grid" class="card" style="display:flex;gap:1rem;flex-wrap:wrap;margin-top:0.75rem;">
        <div class="stat" style="flex:1;min-width:140px;">
            <div class="stat-label">Market cap</div>
            <div id="stat-marketcap" class="stat-value" title="Total company value. A bigger market cap usually means a more stable company. Think of it like the 'size' of the company.">—</div>
        </div>
        <div class="stat" style="flex:1;min-width:140px;">
            <div class="stat-label">P/E ratio</div>
            <div id="stat-pe" class="stat-value" title="Price-to-Earnings: How much you pay for every $1 of profit. Lower is often cheaper, but higher can mean growth potential. Check what's 'normal' for the industry.">—</div>
        </div>
        <div class="stat" style="flex:1;min-width:140px;">
            <div class="stat-label">52w high</div>
            <div id="stat-52h" class="stat-value" title="The highest price this stock reached in the last year. If current price is near this, the stock might be expensive right now.">—</div>
        </div>
        <div class="stat" style="flex:1;min-width:140px;">
            <div class="stat-label">52w low</div>
            <div id="stat-52l" class="stat-value" title="The lowest price this stock reached in the last year. If current price is near this, it might be a good buying opportunity—or a warning sign.">—</div>
        </div>
        <div class="stat" style="flex:1;min-width:140px;">
            <div class="stat-label">Volume</div>
            <div id="stat-vol" class="stat-value" title="How many shares trade on an average day. High volume means it's easy to buy/sell. Low volume can mean fewer buyers/sellers.">—</div>
        </div>
        <div class="stat" style="flex:1;min-width:140px;">
            <div class="stat-label">Change</div>
            <div id="stat-change" class="stat-value" title="Price movement over your selected time period. Shows if the stock went up or down and by how much in $ and %.">—</div>
        </div>
    </div>
    <div id="news-panel" class="card" style="margin-top:1rem;">
        <h3>Latest news</h3>
        <div id="news-list">Loading news…</div>
    </div>
    <div class="chart-controls">
        <button class="range-btn" data-range="1d">1D</button>
        <button class="range-btn" data-range="1w">1W</button>
        <button class="range-btn" data-range="1m">1M</button>
        <button class="range-btn" data-range="3m">3M</button>
        <button class="range-btn" data-range="6m">6M</button>
        <button class="range-btn" data-range="1y">1Y</button>
    </div>
    <canvas id="priceChart" height="220"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
const ticker = '{{ ticker|upper }}';
let chart = null;
function drawChart(data){
        const ctx = document.getElementById('priceChart').getContext('2d');
        // Use formatted dates for x-axis labels
        const labels = data.formattedDates || data.dates;
        const cfg = {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [
                    {
                        type: 'line',
                        label: ticker + ' Close',
                        data: data.close,
                        borderColor: '#2563eb',
                        backgroundColor: 'rgba(37,99,235,0.08)',
                        pointRadius: 0,
                        yAxisID: 'y'
                    },
                    {
                        type: 'bar',
                        label: 'Volume',
                        data: data.volume,
                        backgroundColor: 'rgba(107,114,128,0.18)',
                        yAxisID: 'y1'
                    }
                ]
            },
            options: {
                responsive: true,
                interaction: { mode: 'index', intersect: false },
                scales: {
                    x: { display: true, grid: { display: false } },
                    y: { type: 'linear', display: true, position: 'left', ticks: { callback: v => '$' + v } },
                    y1: { type: 'linear', display: false, position: 'right', grid: { drawOnChartArea: false } }
                },
                plugins: {
                    legend: { display: false },
                            tooltip: {
                                callbacks: {
                                    label: function(ctx){
                                        try{
                                            if(ctx.dataset && ctx.dataset.type === 'bar'){
                                                const v = ctx.raw !== undefined ? ctx.raw : ctx.parsed && ctx.parsed.y;
                                                return 'Vol: ' + (v ? Number(v).toLocaleString() : v);
                                            }
                                            const y = ctx.parsed && ctx.parsed.y !== undefined ? ctx.parsed.y : ctx.raw;
                                            return (ctx.dataset && ctx.dataset.label ? ctx.dataset.label + ': $' : '$') + (y !== undefined ? Number(y).toFixed(2) : y);
                                        } catch(e){
                                            return '';
                                        }
                                    }
                                }
                            }
                }
            }
        };
        if(chart) chart.destroy();
        chart = new Chart(ctx, cfg);
}

async function fetchChart(range='6m'){
    try{
        const res = await fetch(`/api/chart/${ticker}?range=${range}`);
        const js = await res.json();
        if(res.ok){
            // Coerce numeric arrays to numbers and ensure lengths match
            try{
                js.close = (js.close||[]).map(v=> v===null||v===undefined? null : Number(v));
                js.open = (js.open||[]).map(v=> v===null||v===undefined? null : Number(v));
                js.high = (js.high||[]).map(v=> v===null||v===undefined? null : Number(v));
                js.low = (js.low||[]).map(v=> v===null||v===undefined? null : Number(v));
                js.volume = (js.volume||[]).map(v=> v===null||v===undefined? null : Number(v));
                // trim arrays to shortest length to avoid Chart errors
                const lens = [js.dates.length, js.close.length, js.volume.length, js.open.length, js.high.length, js.low.length].filter(Boolean);
                const min = Math.min(...lens);
                if(isFinite(min)){
                    js.dates = js.dates.slice(-min);
                    js.close = js.close.slice(-min);
                    js.open = js.open.slice(-min);
                    js.high = js.high.slice(-min);
                    js.low = js.low.slice(-min);
                    js.volume = js.volume.slice(-min);
                }
            } catch(e){
                console.error('Data normalization error', e, js);
            }
            // pre-format dates for readability depending on range
            try{
                const fmt = (dStr)=>{
                    const d = new Date(dStr);
                    if(isNaN(d)) return dStr;
                    // Always show dates only, no timestamps
                    return d.toLocaleDateString([], {month:'short', day:'numeric'});
                }
                js.formattedDates = js.dates.map(fmt);
            } catch(e){ js.formattedDates = js.dates }
            drawChart(js);
            const last = js.close && js.close.length ? js.close[js.close.length-1] : null;
            const display = last !== null && last !== undefined ? Number(last).toFixed(2) : 'n/a';
            // remove spinner and show value
            document.getElementById('price-summary').innerHTML = `Latest close: $${display}`;
            // mark active range button
            document.querySelectorAll('.range-btn').forEach(b=> b.classList.toggle('active', b.dataset.range===range));
            // compute change over visible range
            try{
                const c = js.close;
                if(c && c.length>1){
                    const first = c[0];
                    const last = c[c.length-1];
                    const pct = ((last-first)/first)*100;
                    const sign = pct>=0? '+' : '';
                    const el = document.getElementById('stat-change');
                    el.innerText = `${sign}${pct.toFixed(2)}% (${(last-first).toFixed(2)})`;
                    el.style.color = pct>=0? 'green':'#b91c1c';
                }
            } catch(e){ console.error(e) }
        } else {
            document.getElementById('price-summary').innerText = js.error || 'No data';
        }
        } catch(e){
            console.error('Fetch/chart error', e);
            document.getElementById('price-summary').innerText = 'Error fetching chart';
        }
}

document.querySelectorAll('.range-btn').forEach(b=>{
    b.addEventListener('click', ()=>{
        fetchChart(b.dataset.range);
    });
});

// default active
document.querySelectorAll('.range-btn').forEach(b=> b.classList.toggle('active', b.dataset.range==='6m'));
fetchChart('6m');

// Auto-refresh chart every 30 seconds for live updates
setInterval(() => {
    const activeBtn = document.querySelector('.range-btn.active');
    const activeRange = activeBtn ? activeBtn.dataset.range : '6m';
    fetchChart(activeRange);
}, 30000);

async function fetchStats(){
    try{
        const res = await fetch(`/api/stats/${ticker}`);
        const js = await res.json();
        if(res.ok){
            const parts = [];
            if(js.price) parts.push(`Price: $${js.price}`);
            if(js.marketCap) parts.push(`Market cap: ${formatLarge(js.marketCap)}`);
            if(js.pe) parts.push(`P/E: ${js.pe}`);
            if(js['52WeekHigh'] && js['52WeekLow']) parts.push(`52w: ${js['52WeekLow']}–${js['52WeekHigh']}`);
            if(js.volume) parts.push(`Vol: ${js.volume.toLocaleString()}`);
            document.getElementById('stock-stats').innerText = parts.join(' • ');
            // populate stats grid
            const fmt = v => v===null||v===undefined? '—' : (typeof v === 'number' && v>=1000 ? Number(v).toLocaleString() : v);
            document.getElementById('stat-marketcap').innerText = js.marketCap? formatLarge(js.marketCap) : '—';
            document.getElementById('stat-pe').innerText = js.pe? Number(js.pe).toFixed(2) : '—';
            document.getElementById('stat-52h').innerText = js['52WeekHigh']? Number(js['52WeekHigh']).toFixed(2) : '—';
            document.getElementById('stat-52l').innerText = js['52WeekLow']? Number(js['52WeekLow']).toFixed(2) : '—';
            document.getElementById('stat-vol').innerText = js.volume? Number(js.volume).toLocaleString() : '—';
        } else {
            document.getElementById('stock-stats').innerText = '';
        }
    } catch(e){
        document.getElementById('stock-stats').innerText = '';
    }
}

function formatLarge(n){
    if(n === null || n === undefined) return '';
    if(n >= 1e12) return (n/1e12).toFixed(2)+'T';
    if(n >= 1e9) return (n/1e9).toFixed(2)+'B';
    if(n >= 1e6) return (n/1e6).toFixed(2)+'M';
    return n.toLocaleString();
}

fetchStats();

// --- News panel + summarization (Phase 4) ---
async function fetchNews(){
    const listEl = document.getElementById('news-list');
    listEl.innerHTML = '<div style="padding:1rem; text-align:center;"><span class="spinner"></span> <span class="loading">Loading news…</span></div>';
    try{
        const res = await fetch(`/api/news/${ticker}`);
        const data = await res.json();
        
        if(!data || !data.articles || data.articles.length === 0){
            listEl.innerText = 'No recent news available right now.';
            return;
        }
        
        // Add sources section below news
        renderNews(data.articles);
        
        // Add sources section at bottom
        const sourcesSection = document.createElement('div');
        sourcesSection.style.marginTop = '1.5rem';
        sourcesSection.style.paddingTop = '1rem';
        sourcesSection.style.borderTop = '1px solid #e2e8f0';
        sourcesSection.innerHTML = '<h4 style="margin-bottom:0.8rem;">📰 Where we got this information</h4>';
        
        const sourcesList = document.createElement('div');
        sourcesList.style.fontSize = '0.9rem';
        sourcesList.style.color = '#64748b';
        
        data.articles.forEach((art, idx) => {
            if(art.link){
                const link = document.createElement('a');
                link.href = art.link;
                link.target = '_blank';
                link.rel = 'noreferrer noopener';
                link.style.display = 'block';
                link.style.marginBottom = '0.5rem';
                link.style.color = '#2563eb';
                link.style.textDecoration = 'none';
                link.innerHTML = `${idx+1}. ${art.publisher || 'Source'}: ${art.title}`;
                sourcesList.appendChild(link);
            }
        });
        
        if(sourcesList.children.length > 0){
            const disclaimer = document.createElement('div');
            disclaimer.style.marginTop = '0.8rem';
            disclaimer.style.color = '#71717a';
            disclaimer.style.fontSize = '0.85rem';
            disclaimer.style.fontStyle = 'italic';
            disclaimer.innerHTML = '⚠️ Always read the full articles and consult a financial advisor before making investment decisions.';
            sourcesSection.appendChild(sourcesList);
            sourcesSection.appendChild(disclaimer);
            listEl.parentElement.appendChild(sourcesSection);
        }
    } catch(e){
        console.error('News fetch error', e);
        listEl.innerText = 'Error loading news. Please refresh and try again.';
    }
}

function highlightTerms(text){
    if(!text) return text;
    const terms = {
        'earnings': 'Company profits over a period',
        'revenue': 'Total income before expenses',
        'dividend': 'A payment some companies make to shareholders',
        'etf': 'A fund that tracks a basket of stocks',
        'p/e ratio': 'A rough measure of how expensive a stock is',
        'p/e': 'A rough measure of how expensive a stock is',
        'bear market': 'A market expected to fall',
        'bull market': 'A market expected to rise',
        'portfolio': 'Your collection of investments',
        'volatility': 'How much a stock price jumps around',
        'market cap': 'The total value of the company in dollars',
        'yield': 'The return you get from dividends',
        'ipo': 'When a company first sells shares to the public',
        'hedge fund': 'An aggressive investment fund',
        'index fund': 'A fund that copies a stock market index',
        'short selling': 'Betting that a stock will go down',
        'options': 'Contracts that let you buy/sell at a future price',
        'inflation': 'When prices rise and money is worth less',
        'interest rate': 'The cost of borrowing money',
        'fiscal quarter': 'A 3-month business period',
        'sec filing': 'Official company reports to regulators',
        'guidance': 'A company\'s forecast for future earnings',
        'analyst': 'An expert who predicts stock prices',
        'valuation': 'An estimate of what a company is worth',
        'volume': 'How many shares trade in a period'
    };
    
    let result = text;
    // Sort by length (longest first) to avoid partial matches
    const sortedTerms = Object.keys(terms).sort((a,b) => b.length - a.length);
    sortedTerms.forEach(term => {
        const re = new RegExp('\\b' + term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\b', 'gi');
        result = result.replace(re, (match) => {
            return `<span class="fintech-term" data-term="${term}" title="${terms[term]}">${match}</span>`;
        });
    });
    return result;
}

function renderNews(items){
    const listEl = document.getElementById('news-list');
    listEl.innerHTML = '';
    
    if(!items || items.length === 0){
        listEl.innerHTML = '<div style="color:#64748b; padding:1rem;">No recent news found.</div>';
        return;
    }
    
    items.forEach((it, i)=>{
        const card = document.createElement('div');
        card.className = 'news-card';
        card.style.padding = '1rem 0';
        card.style.borderBottom = i < items.length-1 ? '1px solid #e2e8f0' : 'none';
        
        const title = document.createElement('div');
        title.innerHTML = highlightTerms(it.title || 'Untitled');
        title.style.fontWeight = '600';
        title.style.marginBottom = '0.4rem';
        
        const meta = document.createElement('div');
        meta.style.fontSize = '0.9rem';
        meta.style.color = '#64748b';
        meta.style.marginBottom = '0.5rem';
        let metaText = it.publisher ? `${it.publisher}` : 'Unknown source';
        if(it.trusted){
            metaText += ' ✓ Trusted';
        }
        meta.innerText = metaText;
        
        const actions = document.createElement('div');
        actions.style.marginTop = '0.6rem';
        actions.style.display = 'flex';
        actions.style.gap = '0.5rem';
        
        const sumBtn = document.createElement('button');
        sumBtn.className = 'btn';
        sumBtn.style.padding = '0.4rem 0.8rem';
        sumBtn.style.fontSize = '0.9rem';
        sumBtn.innerText = 'Summarize';
        sumBtn.onclick = async ()=>{
            await summarizeArticle(it, card);
        };
        actions.appendChild(sumBtn);
        
        if(it.link){
            const read = document.createElement('a');
            read.href = it.link;
            read.target = '_blank';
            read.rel = 'noreferrer noopener';
            read.style.padding = '0.4rem 0.8rem';
            read.style.fontSize = '0.9rem';
            read.style.textDecoration = 'none';
            read.style.color = '#2563eb';
            read.innerText = '→ Read full article';
            actions.appendChild(read);
        }
        
        const summaryEl = document.createElement('div');
        summaryEl.className = 'news-summary';
        summaryEl.style.marginTop = '0.6rem';
        summaryEl.style.color = '#1f2937';
        summaryEl.style.lineHeight = '1.6';
        
        card.appendChild(title);
        card.appendChild(meta);
        card.appendChild(actions);
        card.appendChild(summaryEl);
        listEl.appendChild(card);
    });
}

const summaryCache = {};
async function summarizeArticle(item, containerEl){
    const summaryEl = containerEl.querySelector('.news-summary');
    const key = (item.link || item.title || '') + '';
    
    if(summaryCache[key]){
        summaryEl.innerHTML = highlightTerms(summaryCache[key]);
        return;
    }
    
    summaryEl.innerHTML = '<span class="spinner" style="display:inline-block; margin-right:0.5rem;"></span><span style="color:#64748b;">Summarizing… this usually takes a few seconds 🤔</span>';
    
    try{
        // Prefer full article content when available
        const textToSummarize = item.content && item.content.length > 40 ? 
            item.content : 
            `${item.title || ''}\n${item.link || ''}`;
        
        const body = { text: textToSummarize, length: 400 };
        const res = await fetch('/api/summarize', { 
            method: 'POST', 
            headers: { 'Content-Type': 'application/json' }, 
            body: JSON.stringify(body)
        });
        
        if(!res.ok){
            const err = await res.json();
            summaryEl.innerHTML = `<span style="color:#dc2626;">⚠️ ${err.error || 'Could not summarize. Please try again.'}</span>`;
            return;
        }
        
        const js = await res.json();
        const out = js.summary || js?.result || 'Summary unavailable.';
        summaryCache[key] = out;
        summaryEl.innerHTML = highlightTerms(out);
    } catch(e){
        console.error('Summarize error', e);
        summaryEl.innerHTML = '<span style="color:#dc2626;">Error summarizing. Please try again.</span>';
    }
}

// fetch news on load
fetchNews();
</script>
{% endblock %}
